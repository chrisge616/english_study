<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Easy Mode UI Shell</title>
</head>
<body>
  <main>
    <h1>Easy Mode UI Shell</h1>

    <form method="post" action="/action">
      <button type="submit" name="action" value="generate_daily_prompt">Generate Daily Prompt</button>
    </form>

    <form method="post" action="/action">
      <button type="submit" name="action" value="generate_review_pack">Generate Review Pack</button>
    </form>

    <form method="post" action="/action">
      <button type="submit" name="action" value="get_current_paths">Show Current Paths</button>
    </form>

    <form method="post" action="/action">
      <button type="submit" name="action" value="sync_to_obsidian">Sync to Obsidian</button>
    </form>

    <section>
      <h2>Daily Logs</h2>

      <form method="post" action="/action">
        <button type="submit" name="action" value="sync_daily_logs">Sync Daily Logs from Obsidian</button>
      </form>

      <form method="post" action="/action">
        <button type="submit" name="action" value="show_recent_daily_logs">Show Recent Daily Logs</button>
      </form>

      <form method="post" action="/action">
        <button type="submit" name="action" value="ingest_most_recent_daily_log">Ingest Most Recent Daily Log</button>
      </form>
    </section>

    <form method="post" action="/action">
      <label for="daily-log-path">Ingest Daily Log (Fallback Path)</label>
      <input id="daily-log-path" type="text" name="path" placeholder="logs/daily/2026-04-11_gen2.md">
      <button type="submit" name="action" value="ingest_daily_log">Ingest Daily Log</button>
    </form>

    <section>
      <h2>Review Results</h2>

      <form method="post" action="/action">
        <button type="submit" name="action" value="show_recent_review_logs">Show Recent Review Results</button>
      </form>

      <form method="post" action="/action">
        <button type="submit" name="action" value="ingest_most_recent_review_log">Ingest Most Recent Review Result</button>
      </form>

      <form method="post" action="/action">
        <label for="review-markdown">Paste Final Review Result</label>
        <textarea id="review-markdown" name="review_markdown" rows="16" placeholder="# 2026-04-14 Review"></textarea>
        <button type="submit" name="action" value="ingest_pasted_review_markdown">Paste and Ingest Review Result</button>
      </form>
    </section>

    <form method="post" action="/action">
      <label for="review-log-path">Ingest Review Result (Fallback Path)</label>
      <input id="review-log-path" type="text" name="path" placeholder="logs/review/2026-04-11_review.md">
      <button type="submit" name="action" value="ingest_review_log">Ingest Review Result</button>
    </form>

    $result_panel
  </main>
  <script>
    document.addEventListener("click", async (event) => {
      const button = event.target.closest(".copy-to-clipboard");
      if (!button) {
        return;
      }

      const targetId = button.getAttribute("data-copy-target");
      const successMessage = button.getAttribute("data-copy-success") || "Copied to clipboard.";
      const source = document.getElementById(targetId);
      const status = button.parentElement ? button.parentElement.querySelector('[aria-live="polite"]') : document.getElementById("copy-status");
      if (!source) {
        if (status) {
          status.textContent = "Could not find the text to copy.";
        }
        return;
      }

      const selectSource = () => {
        source.focus();
        source.select();
        source.setSelectionRange(0, source.value.length);
      };

      try {
        if (navigator.clipboard && window.isSecureContext) {
          await navigator.clipboard.writeText(source.value);
          if (status) {
            status.textContent = successMessage;
          }
          return;
        }
      } catch (error) {
      }

      try {
        selectSource();
        if (document.execCommand("copy")) {
          if (status) {
            status.textContent = successMessage;
          }
          return;
        }
      } catch (error) {
      }

      selectSource();
      if (status) {
        status.textContent = "Clipboard copy was blocked. The text is selected - press Ctrl+C.";
      }
    });
  </script>
</body>
</html>
